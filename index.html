<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
    }

    h1 {
        color: white;
        margin-bottom: 40px;
    }

    button {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
    }

    #yes {
        background: #4CAF50;
        color: white;
        margin-right: 20px;
    }

    #no {
        background: #f44336;
        color: white;
        position: absolute;
        left: 60%;
        top: 60%;
        transition: top 0.25s ease, left 0.25s ease;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Would you like to go out with me? 💕</h1>
    <button id="yes">Yes 😍</button>
</div>

<button id="no">No 🙃</button>

<script>
const noBtn = document.getElementById("no");

// starting position
let x = window.innerWidth / 2;
let y = window.innerHeight / 2;

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

noBtn.addEventListener("mouseenter", () => {

    const step = 120;

    const direction = Math.floor(Math.random() * 4);

    if (direction === 0) x += step;
    if (direction === 1) x -= step;
    if (direction === 2) y += step;
    if (direction === 3) y -= step;

    const maxX = window.innerWidth - noBtn.offsetWidth - 20;
    const maxY = window.innerHeight - noBtn.offsetHeight - 20;

    if (x < 20) x = 20;
    if (y < 20) y = 20;
    if (x > maxX) x = maxX;
    if (y > maxY) y = maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// YES button action
document.getElementById("yes").onclick = () => {
    document.body.innerHTML = `
        <div style="
            height:100vh;
            width:100vw;
            display:flex;
            justify-content:center;
            align-items:center;
            position:relative;
            font-family:Arial;
            background: url('./732d4891215702b953fa457e7c75d3db.jpg') center/cover no-repeat;
        ">

            <!-- dark overlay -->
            <div style="
                position:absolute;
                width:100%;
                height:100%;
                background:rgba(0,0,0,0.4);
            "></div>

            <h1 style="
                position:relative;
                color:white;
                font-size:45px;
                text-shadow: 2px 2px 10px black;
            ">
                She said YES 💖
            </h1>
        </div>
    `;
};
</script>

</body>
</html>
