<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💖 A Question for You</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.2);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
        color: white;
        font-size: 28px;
        margin-bottom: 30px;
    }

    .btn {
        padding: 12px 25px;
        font-size: 18px;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.2s;
        margin: 10px;
    }

    #yes {
        background-color: #4CAF50;
        color: white;
    }

    #no {
        background-color: #f44336;
        color: white;
        position: absolute;
    }

</style>
</head>
<body>

<div class="container">
    <h1>Would you like to go out with me? 💕</h1>
    <button id="yes" class="btn" onclick="yesClicked()">Yes 😍</button>
    <button id="no" class="btn">No 🙃</button>
</div>

<script>
    const noBtn = document.getElementById("no");

    // Move button when mouse gets close
    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 100);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    function yesClicked() {
        document.body.innerHTML = `
            <div style="height:100vh;display:flex;justify-content:center;align-items:center;
            font-family:Arial;background:linear-gradient(135deg,#ffdde1,#ee9ca7);text-align:center;">
                <div>
                    <h1 style="color:white;font-size:40px;">Yay!! 💖</h1>
                    <p style="color:white;font-size:20px;">You just made me the happiest person 😭💕</p>
                </div>
            </div>
        `;
    }
</script>

</body>
</html>
